<!DOCTYPE html>
<html>
<head>
  <title>Weerstation</title>

  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #65AAE6;
      margin: 0;
      padding: 20px;
    }

    h1 {
      color: white;
      margin-bottom: 20px;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      max-width: 700px;
      margin: auto;
    }

    .box {
      background: white;
      padding: 10px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      width: 100%;
    }

    iframe {
      width: 100%;
      height: 260px;
      border: none;
    }
  </style>

</head>

<body>

<h1>Weersgrafieken</h1>

<div class="container">

<div class="box">
<iframe src="https://thingspeak.com/channels/3293235/charts/1?bgcolor=%23ffffff&color=%23d62020&dynamic=true&results=60&type=line&update=15"></iframe>
</div>

<div class="box">
<iframe src="https://thingspeak.com/channels/3293235/charts/2?bgcolor=%23ffffff&color=%23d62020&dynamic=true&results=60&type=line&update=15"></iframe>

</div>

</body>
</html>
